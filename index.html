<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my f12 console</title>
    <style>
        body { background:#000; color:#ccc; font-family:monospace; margin:0; padding:15px; }
        h1 { color:#fff; text-align:center; font-size:18px; }
        input, textarea { background:#111; color:#eee; border:1px solid #555; padding:8px; margin:8px 0; width:100%; box-sizing:border-box; }
        textarea { height:320px; }
        button { background:#222; color:#ccc; border:1px solid #555; padding:10px 16px; margin:4px; cursor:pointer; }
        button:hover { background:#444; color:#fff; }
        .script-item { background:#111; padding:10px; margin:8px 0; border:1px solid #555; display:flex; justify-content:space-between; }
        .log { color:#777; margin-top:10px; }
    </style>
</head>
<body>
    <h1>my f12 console v3</h1>
    <p>standalone script manager</p>

    <input type="text" id="scriptName" placeholder="script name">
    <input type="text" id="targetUrl" placeholder="ziel url (z.b. https://instagram.com)" value="">
    <textarea id="codeArea" placeholder="js code hier..."></textarea>

    <div>
        <button onclick="saveScript()">save</button>
        <button onclick="runOnTarget()">▶️ Auf Zielseite ausführen</button>
        <button onclick="clearEditor()">clear</button>
    </div>

    <h2>gespeicherte scripts</h2>
    <div id="scriptsList"></div>

    <div class="log" id="status"></div>

    <script>
        let scripts = JSON.parse(localStorage.getItem('ipadScripts') || '[]');

        function renderScripts() {
            const list = document.getElementById('scriptsList');
            list.innerHTML = '';
            scripts.forEach((s, i) => {
                const div = document.createElement('div');
                div.className = 'script-item';
                div.innerHTML = `
                    <div><strong>${s.name}</strong><br><small>${s.target || 'any'}</small></div>
                    <div>
                        <button onclick="loadScript(${i})">load</button>
                        <button onclick="deleteScript(${i})">del</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function saveScript() {
            const name = document.getElementById('scriptName').value.trim() || 'script_' + Date.now();
            const code = document.getElementById('codeArea').value.trim();
            const target = document.getElementById('targetUrl').value.trim();
            if (!code) return alert("code fehlt");
            scripts.push({name, code, target});
            localStorage.setItem('ipadScripts', JSON.stringify(scripts));
            renderScripts();
            document.getElementById('status').textContent = 'gespeichert';
        }

        function loadScript(i) {
            const s = scripts[i];
            document.getElementById('scriptName').value = s.name;
            document.getElementById('codeArea').value = s.code;
            document.getElementById('targetUrl').value = s.target || '';
        }

        function deleteScript(i) {
            if(confirm('löschen?')) {
                scripts.splice(i,1);
                localStorage.setItem('ipadScripts', JSON.stringify(scripts));
                renderScripts();
            }
        }

        function clearEditor() {
            document.getElementById('codeArea').value = '';
        }

        // Direkt auf Zielseite ausführen (öffnet neue Seite + inject)
        function runOnTarget() {
            let code = document.getElementById('codeArea').value.trim();
            let url = document.getElementById('targetUrl').value.trim();

            if (!code) return alert("kein code");

            if (!url) url = "https://google.com"; // fallback

            // Erweiterter Inject-Code
            const injector = `
                javascript:(function(){
                    let s = document.createElement('script');
                    s.textContent = ${JSON.stringify(code)};
                    document.body.appendChild(s);
                    console.log('%c[Injected from my f12]', 'color:lime');
                })();
            `;

            window.open(url + '#' + encodeURIComponent(injector), '_blank');
            document.getElementById('status').textContent = 'Seite geöffnet – Bookmarklet im Hash';
        }

        window.onload = () => {
            renderScripts();
        };
    </script>
</body>
</html>
