<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my f12 console</title>
    <style>
        body { background:#000; color:#ccc; font-family:monospace; margin:0; padding:15px; }
        h1 { color:#fff; text-align:center; font-size:18px; }
        input, textarea { background:#111; color:#eee; border:1px solid #555; padding:8px; margin:8px 0; width:100%; box-sizing:border-box; }
        textarea { height:220px; }
        button { background:#222; color:#ccc; border:1px solid #555; padding:10px 16px; margin:4px; cursor:pointer; }
        button:hover { background:#444; color:#fff; }
        .script-item { background:#111; padding:10px; margin:8px 0; border:1px solid #555; display:flex; justify-content:space-between; }
        #console { 
            background:#111; 
            border:1px solid #555; 
            height:250px; 
            overflow-y:auto; 
            padding:8px; 
            margin-top:15px; 
            font-size:13px; 
            white-space:pre-wrap;
        }
        .log { color:#0f0; }
        .error { color:#f66; }
        .warn { color:#ff0; }
    </style>
</head>
<body>
    <h1>my f12 console v4</h1>
    <p>standalone + live console</p>

    <input type="text" id="scriptName" placeholder="script name">
    <input type="text" id="targetUrl" placeholder="https://www.instagram.com" value="">
    <textarea id="codeArea" placeholder="js code hier..."></textarea>

    <div>
        <button onclick="saveScript()">save</button>
        <button onclick="openAndInject()">▶️ Seite öffnen + Inject</button>
        <button onclick="clearEditor()">clear</button>
        <button onclick="clearConsole()">clear console</button>
    </div>

    <h2>gespeicherte scripts</h2>
    <div id="scriptsList"></div>

    <h2>live console</h2>
    <div id="console"></div>

    <script>
        let scripts = JSON.parse(localStorage.getItem('ipadScripts') || '[]');

        // Eigene Console
        const consoleDiv = document.getElementById('console');
        function log(text, type = 'log') {
            const line = document.createElement('div');
            line.className = type;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
            consoleDiv.appendChild(line);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        // Original Console überschreiben
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;
        console.log = (...args) => { originalLog(...args); log(args.join(' '), 'log'); };
        console.error = (...args) => { originalError(...args); log(args.join(' '), 'error'); };
        console.warn = (...args) => { originalWarn(...args); log(args.join(' '), 'warn'); };

        function renderScripts() {
            const list = document.getElementById('scriptsList');
            list.innerHTML = '';
            scripts.forEach((s, i) => {
                const div = document.createElement('div');
                div.className = 'script-item';
                div.innerHTML = `
                    <div><strong>${s.name}</strong><br><small>${s.target || 'any'}</small></div>
                    <div>
                        <button onclick="loadScript(${i})">load</button>
                        <button onclick="deleteScript(${i})">del</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function saveScript() {
            const name = document.getElementById('scriptName').value.trim() || 'script_' + Date.now();
            const code = document.getElementById('codeArea').value.trim();
            const target = document.getElementById('targetUrl').value.trim();
            if (!code) return alert("code fehlt");
            scripts.push({name, code, target});
            localStorage.setItem('ipadScripts', JSON.stringify(scripts));
            renderScripts();
            log('Script gespeichert: ' + name);
        }

        function loadScript(i) {
            const s = scripts[i];
            document.getElementById('scriptName').value = s.name;
            document.getElementById('codeArea').value = s.code;
            document.getElementById('targetUrl').value = s.target || '';
        }

        function deleteScript(i) {
            if(confirm('löschen?')) {
                scripts.splice(i,1);
                localStorage.setItem('ipadScripts', JSON.stringify(scripts));
                renderScripts();
            }
        }

        function clearEditor() {
            document.getElementById('codeArea').value = '';
        }

        function clearConsole() {
            consoleDiv.innerHTML = '';
        }

        function openAndInject() {
            let url = document.getElementById('targetUrl').value.trim();
            let code = document.getElementById('codeArea').value.trim();

            if (!code) return alert("kein code");

            if (!url) url = "https://google.com";

            log('Öffne Seite: ' + url);

            const injector = `
                javascript:(function(){
                    console.log = function(...a){window.parent && window.parent.postMessage({type:'log',text:a.join(' ')},'*'); originalLog(...a);};
                    try {
                        ${code}
                    } catch(e) {
                        console.error(e);
                    }
                })();
            `;

            window.open(url, '_blank');
            log('Seite geöffnet – benutze dein Fake-F12 Bookmarklet danach');
        }

        window.onload = () => {
            renderScripts();
            log('my f12 console v4 gestartet');
        };
    </script>
</body>
</html>
